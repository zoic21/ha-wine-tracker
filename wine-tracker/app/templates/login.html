<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
(function(){var n=localStorage.getItem('wine-theme-name')||'homeassistant';if(n&&n!=='classic')document.documentElement.setAttribute('data-theme',n);var s=localStorage.getItem('wine-theme')||'system';var e=s==='system'?(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'):s;if(e==='light')document.documentElement.classList.add('light');})();
</script>
<title>Wine Tracker – Login</title>
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .login-logo {
    width: 64px;
    height: 64px;
    margin-bottom: 1rem;
    border-radius: 12px;
  }
  .login-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    text-align: left;
  }
  .login-form input[type=text],
  .login-form input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .55rem .75rem;
    color: var(--text);
    font-size: .9rem;
    transition: border-color .2s;
    height: 38px;
    box-sizing: border-box;
  }
  .login-form input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .login-error {
    background: rgba(231, 76, 60, .12);
    color: #e74c3c;
    border: 1px solid rgba(231, 76, 60, .25);
    border-radius: 8px;
    padding: .6rem .75rem;
    font-size: .85rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Wine Tracker" class="login-logo">
    <div class="login-title">Wine Tracker</div>

    {% if error %}
    <div class="login-error" style="margin-bottom: 1rem;">
      <i class="mdi mdi-alert-circle"></i>
      Invalid username or password.
    </div>
    {% endif %}

    <form class="login-form" method="POST" action="{{ url_for('login') }}">
      <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
